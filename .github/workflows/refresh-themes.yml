name: Refresh themes-data.json

on:
  schedule:
    # Daily at 06:30 UTC
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Scrape themes from GitHub
        run: node scripts/scrape.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/themes-data.json; then
            echo "No changes."
          else
            git add src/data/themes-data.json
            git commit -m "Refresh themes-data.json"
            git push
          fi
