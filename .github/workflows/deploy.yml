name: Daily Rebuild

on:
  schedule:
    # Daily at 6:30 AM UTC (30min after scraper cron)
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        run: curl -s -X POST "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"
